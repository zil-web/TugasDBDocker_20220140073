<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User CRUD</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial;
            margin:40px;
            text-align:center;
        }

        input,button{
            padding:8px;
            margin:5px 0;
        }

        table{
            border-collapse:collapse;
            margin-top:20px;
            width:100%;
        }

        table,th,td{
            border:1px solid #ccc;
            padding:10px;
        }

        th{
            background:#f4f4f4;
        }

        .delete-btn{
            background:red;
            color:white;
            border:none;
            cursor:pointer;
        }

        .edit-btn{
            background:orange;
            color:white;
            border:none;
            cursor:pointer;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }

        /* image bawah form */
        .login-image{
            margin-top:20px;
        }

        .login-image img{
            width:300px;
            height:auto;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,.2);
        }
    </style>
</head>
<body>

<h2>Form User</h2>

<form id="userForm">
    <input type="hidden" id="userId">

    <input type="text" id="name" placeholder="Nama" required>
    <input type="text" id="nim" placeholder="NIM" required>

    <button type="submit">Simpan</button>
    <button type="button" onclick="resetForm()">Reset</button>
</form>

<!-- IMAGE DI BAWAH FORM -->
<div class="login-image">
    <img src="img.png" alt="User Image">
    <!-- ganti images/user.png dengan lokasi gambar kamu -->
</div>

<div id="message"></div>

<h2>List User</h2>

<table>
    <thead>
    <tr>
        <th>Nama</th>
        <th>NIM</th>
        <th>Aksi</th>
    </tr>
    </thead>

    <tbody id="userTable"></tbody>
</table>

<script>
    const BASE_URL="/api/users";

    function loadUsers(){
        $.ajax({
            url:BASE_URL,
            type:"GET",
            success:function(users){
                $("#userTable").empty();

                users.forEach(function(user){
                    $("#userTable").append(`
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.nim}</td>
                        <td>
                            <button class="edit-btn"
                            onclick="editUser('${user.id}','${user.name}','${user.nim}')">
                            Edit
                            </button>

                            <button class="delete-btn"
                            onclick="deleteUser('${user.id}')">
                            Delete
                            </button>
                        </td>
                    </tr>
                `);
                });
            }
        });
    }

    $("#userForm").submit(function(e){
        e.preventDefault();

        const id=$("#userId").val();

        const userData={
            name:$("#name").val(),
            nim:$("#nim").val()
        };

        if(id){
            $.ajax({
                url:BASE_URL+"/"+id,
                type:"PUT",
                contentType:"application/json",
                data:JSON.stringify(userData),
                success:function(){
                    $("#message").html("User berhasil diupdate").attr("class","success");
                    resetForm();
                    loadUsers();
                }
            });
        }else{
            $.ajax({
                url:BASE_URL,
                type:"POST",
                contentType:"application/json",
                data:JSON.stringify(userData),
                success:function(){
                    $("#message").html("User berhasil ditambahkan").attr("class","success");
                    resetForm();
                    loadUsers();
                }
            });
        }
    });

    function editUser(id,name,nim){
        $("#userId").val(id);
        $("#name").val(name);
        $("#nim").val(nim);
    }

    function deleteUser(id){
        if(!confirm("Yakin ingin hapus user?")) return;

        $.ajax({
            url:BASE_URL+"/"+id,
            type:"DELETE",
            success:function(){
                loadUsers();
            }
        });
    }

    function resetForm(){
        $("#userId").val("");
        $("#name").val("");
        $("#nim").val("");
        $("#message").html("");
    }

    $(document).ready(function(){
        loadUsers();
    });
</script>

</body>
</html>
